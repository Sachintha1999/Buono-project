<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buono - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login-style.css">
    <link rel="stylesheet" href="mobile.css">
</head>
<body class="login-body">

    <!-- ===== LOGIN FORM ===== -->
    <div class="login-container">
        <div class="login-header">
            <span class="login-icon">🍴</span>
            <h1>Buono</h1>
            <p>Employee Management System</p>
        </div>

        <form id="loginForm" onsubmit="return false;">
            <input type="text" id="loginNickname" placeholder="Nick Name" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="button" id="loginBtn" onclick="loginUser()">🔐 Login</button>
        </form>

        <p id="loginError">
            ❌ Nickname or Password wrong!
        </p>
    </div>

    <!-- ===== FIREBASE SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>

    <!-- ===== LOGIN SCRIPT ===== -->
    <script src="login-script.js"></script>

    <!-- ===== MOBILE SCRIPT ===== -->
    <script src="mobile-script.js"></script>

</body>
</html>
