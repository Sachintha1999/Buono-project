<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buono - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <!-- ===== LOGIN FORM ===== -->
    <div class="login-container">
        <div class="login-header">
            <span class="login-icon">🍴</span>
            <h1>Buono</h1>
            <p>Employee Management System</p>
        </div>

        <form id="loginForm" onsubmit="return false;">
            <input type="text" id="loginNickname" placeholder="Nick Name" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="button" id="loginBtn" onclick="loginUser()">🔐 Login</button>
        </form>

        <p id="loginError" style="color: #ff4444; text-align: center; margin-top: 10px; display: none;">
            ❌ Nickname or Password wrong!
        </p>
    </div>

    <!-- ===== FIREBASE SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // ===================================
        // Firebase Config
        // ===================================
        const firebaseConfig = {
            apiKey: "AIzaSyBkXBs5GrfnMIFnJLJWkSMULYxGKz0Shtk",
            authDomain: "buono-project-927b8.firebaseapp.com",
            projectId: "buono-project-927b8",
            storageBucket: "buono-project-927b8.firebasestorage.app",
            messagingSenderId: "706681135399",
            appId: "1:706681135399:web:c15f197f1efe3a64f00902"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ===================================
        // 🚀 REDIRECT FUNCTION (Access type අනුව)
        // ===================================
        function redirectByAccess(access) {
            switch(access) {
                case 'Admin':
                    window.location.href = 'index.html';
                    break;
                case 'Manager':
                    window.location.href = 'manager.html';
                    break;
                case 'Cashier':
                    window.location.href = 'cashier.html';  // 🆕 Cashier dashboard
                    break;
                case 'Head Chef':
                    alert('⚠️ Head Chef Dashboard coming soon!');
                    break;
                case 'Waiter':
                    alert('⚠️ Waiter Dashboard coming soon!');
                    break;
                case 'Call Operator':
                    alert('⚠️ Call Operator Dashboard coming soon!');
                    break;
                case 'Purchasing Officer':
                    alert('⚠️ Purchasing Dashboard coming soon!');
                    break;
                default:
                    alert('⚠️ Unknown access type!');
            }
        }

        // ===================================
        // LOGIN FUNCTION
        // ===================================
        async function loginUser() {
            const nickname = document.getElementById('loginNickname').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorEl = document.getElementById('loginError');

            if (!nickname || !password) {
                errorEl.textContent = "⚠️ Please enter Nickname and Password!";
                errorEl.style.display = "block";
                return;
            }

            try {
                const snapshot = await db.collection('employees')
                    .where('nickname', '==', nickname)
                    .get();

                if (snapshot.empty) {
                    errorEl.textContent = "❌ Nickname not found!";
                    errorEl.style.display = "block";
                    return;
                }

                const userDoc = snapshot.docs[0];
                const userData = userDoc.data();

                if (userData.password !== password) {
                    errorEl.textContent = "❌ Wrong Password!";
                    errorEl.style.display = "block";
                    return;
                }

                // LOGIN SUCCESS
                const userInfo = {
                    id: userDoc.id,
                    name: userData.name,
                    nickname: userData.nickname,
                    access: userData.access
                };

                sessionStorage.setItem('loggedInUser', JSON.stringify(userInfo));

                // Redirect
                redirectByAccess(userData.access);

            } catch (error) {
                console.error("Login error:", error);
                errorEl.textContent = "❌ Connection error! Try again.";
                errorEl.style.display = "block";
            }
        }

        // ENTER key press
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginUser();
            }
        });

        // දැනටමත් login වෙලා නම් redirect
        const existingUser = sessionStorage.getItem('loggedInUser');
        if (existingUser) {
            const user = JSON.parse(existingUser);
            redirectByAccess(user.access);
        }
    </script>

</body>
</html>
