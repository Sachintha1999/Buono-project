<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="access-style.css">
    <title>Access - Buono</title>
</head>
<body>

<div class="top-bar">
    <div class="top-bar-brand">
        <div class="brand-logo">☕</div>
        <div>
            <div class="brand-name">Buono</div>
            <div class="brand-sub">Cafe + Academy</div>
        </div>
    </div>
    <div class="top-bar-right">
        <span class="user-badge" id="userBadge">Loading...</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="main-content">

    <div class="welcome-section">
        <div class="welcome-greeting" id="welcomeGreeting">Welcome! 👋</div>
        <div class="welcome-sub">Select a database to continue</div>
    </div>

    <div class="stat-row">
        <div class="stat-card">
            <div class="stat-icon">👤</div>
            <div class="stat-info">
                <div class="stat-value" id="statUser">-</div>
                <div class="stat-label">Logged In User</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🏷️</div>
            <div class="stat-info">
                <div class="stat-value" id="statAccess">-</div>
                <div class="stat-label">Access Level</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📅</div>
            <div class="stat-info">
                <div class="stat-value" id="statDate">-</div>
                <div class="stat-label">Today's Date</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🗄️</div>
            <div class="stat-info">
                <div class="stat-value" id="statDBCount">-</div>
                <div class="stat-label">Databases Available</div>
            </div>
        </div>
    </div>

    <div class="section-title">📂 Available Databases</div>

    <div class="db-cards-grid" id="dbCardsGrid">
        <!-- JS fills this -->
    </div>

</div>

<!-- ✅ Firebase Scripts - MUST be at bottom of body! -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-config.js"></script>
<script src="access-script.js"></script>
<script src="mobile-script.js"></script>

</body>
</html>
