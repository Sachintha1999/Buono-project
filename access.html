<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access - Buono</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ── TOP BAR ── */
        .top-bar {
            background: #16213e;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #f0a500;
        }

        .top-bar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo { font-size: 24px; }

        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: #f0a500;
        }

        .brand-sub {
            font-size: 11px;
            color: #888;
            margin-top: 1px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-badge {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: white;
        }

        .logout-btn {
            background: rgba(255,68,68,0.15);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #ff4444;
            color: white;
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        /* ── WELCOME ── */
        .welcome-section {
            text-align: center;
            margin-bottom: 36px;
        }

        .welcome-greeting {
            font-size: 28px;
            font-weight: 700;
            color: #f0a500;
            margin-bottom: 6px;
        }

        .welcome-sub {
            font-size: 14px;
            color: #888;
        }

        /* ── STAT CARDS ── */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 36px;
        }

        .stat-card {
            background: #16213e;
            border: 1px solid rgba(240,165,0,0.2);
            border-radius: 12px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .stat-card .stat-icon { font-size: 28px; }

        .stat-card .stat-info .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #f0a500;
        }

        .stat-card .stat-info .stat-label {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        /* ── SECTION TITLE ── */
        .section-title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        /* ── DB CARDS GRID ── */
        .db-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        /* ── DB CARD ── */
        .db-card {
            background: #16213e;
            border: 1px solid rgba(240,165,0,0.2);
            border-radius: 14px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: block;
        }

        .db-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: #f0a500;
            transform: scaleX(0);
            transition: transform 0.25s;
        }

        .db-card:hover {
            border-color: #f0a500;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(240,165,0,0.15);
        }

        .db-card:hover::before { transform: scaleX(1); }

        .db-card.reports-card {
            border-color: rgba(33,150,243,0.3);
        }

        .db-card.reports-card::before {
            background: linear-gradient(90deg, #f0a500, #2196F3);
        }

        .db-card.reports-card:hover {
            border-color: #2196F3;
            box-shadow: 0 8px 24px rgba(33,150,243,0.15);
        }

        .db-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .db-card-icon { font-size: 36px; }

        .db-card-badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-management {
            background: rgba(33,150,243,0.2);
            color: #2196F3;
            border: 1px solid rgba(33,150,243,0.3);
        }

        .badge-entry {
            background: rgba(240,165,0,0.15);
            color: #f0a500;
            border: 1px solid rgba(240,165,0,0.3);
        }

        .db-card-title {
            font-size: 18px;
            font-weight: 700;
            color: #e0e0e0;
            margin-bottom: 6px;
        }

        .db-card-desc {
            font-size: 13px;
            color: #888;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .perm-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .perm-badge {
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 20px;
            font-weight: 600;
        }

        .perm-add    { background: rgba(76,175,80,0.15);  color: #4CAF50; }
        .perm-view   { background: rgba(33,150,243,0.15); color: #2196F3; }
        .perm-self   { background: rgba(240,165,0,0.15);  color: #f0a500; }
        .perm-edit   { background: rgba(156,39,176,0.15); color: #9C27B0; }
        .perm-delete { background: rgba(255,68,68,0.15);  color: #ff4444; }
        .perm-reports{ background: rgba(33,150,243,0.15); color: #2196F3; }

        .db-card-arrow {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 18px;
            color: rgba(240,165,0,0.4);
            transition: all 0.2s;
        }

        .db-card:hover .db-card-arrow {
            color: #f0a500;
            transform: translateX(4px);
        }

        .db-card.reports-card:hover .db-card-arrow {
            color: #2196F3;
        }

        .no-access-msg {
            text-align: center;
            padding: 48px 20px;
            color: #888;
        }

        .no-access-msg .na-icon {
            font-size: 48px;
            margin-bottom: 14px;
            opacity: 0.4;
        }

        .no-access-msg h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #aaa;
        }

        .no-access-msg p { font-size: 13px; }

        @media (max-width: 600px) {
            .db-cards-grid { grid-template-columns: 1fr; }
            .stat-row { grid-template-columns: 1fr 1fr; }
            .welcome-greeting { font-size: 22px; }
            .top-bar { padding: 12px 16px; }
        }
    </style>
</head>
<body>

<!-- 🔝 TOP BAR -->
<div class="top-bar">
    <div class="top-bar-brand">
        <div class="brand-logo">☕</div>
        <div>
            <div class="brand-name">Buono</div>
            <div class="brand-sub">Cafe + Academy</div>
        </div>
    </div>
    <div class="top-bar-right">
        <span class="user-badge" id="userBadge">Loading...</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<!-- 🏠 MAIN CONTENT -->
<div class="main-content">

    <div class="welcome-section">
        <div class="welcome-greeting" id="welcomeGreeting">Welcome! 👋</div>
        <div class="welcome-sub">Select a database to continue</div>
    </div>

    <div class="stat-row">
        <div class="stat-card">
            <div class="stat-icon">👤</div>
            <div class="stat-info">
                <div class="stat-value" id="statUser">-</div>
                <div class="stat-label">Logged In User</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🏷️</div>
            <div class="stat-info">
                <div class="stat-value" id="statAccess">-</div>
                <div class="stat-label">Access Level</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📅</div>
            <div class="stat-info">
                <div class="stat-value" id="statDate">-</div>
                <div class="stat-label">Today's Date</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🗄️</div>
            <div class="stat-info">
                <div class="stat-value" id="statDBCount">-</div>
                <div class="stat-label">Databases Available</div>
            </div>
        </div>
    </div>

    <div class="section-title">📂 Available Databases</div>

    <div class="db-cards-grid" id="dbCardsGrid">
        <!-- JS fills this -->
    </div>

</div>

<!-- ===== FIREBASE SDK (Compat v8 - MATCHING!) ===== -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // 🔥 Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBkXBs5GrfnMIFnJLJWkSMULYxGKz0Shtk",
        authDomain: "buono-project-927b8.firebaseapp.com",
        projectId: "buono-project-927b8",
        storageBucket: "buono-project-927b8.firebasestorage.app",
        messagingSenderId: "706681135399",
        appId: "1:706681135399:web:c15f197f1efe3a64f00902"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ══════════════════════════════════════
    // 👤 SESSION CHECK
    // ✅ FIXED: loggedInUser key use කරනවා!
    // ══════════════════════════════════════
    let currentUser = null;

    async function init() {
        // ✅ CORRECT session key!
        const stored = sessionStorage.getItem('loggedInUser');
        if (!stored) {
            window.location.href = 'login.html';
            return;
        }

        currentUser = JSON.parse(stored);

        // 🔄 Latest permissions Firebase එකෙන්
        try {
            const userDoc = await db.collection('employees').doc(currentUser.id).get();
            if (userDoc.exists) {
                const fresh = userDoc.data();
                currentUser.permissions = fresh.permissions || {};
                currentUser.access = fresh.access || currentUser.access;
                currentUser.name = fresh.name || currentUser.name;
                currentUser.nickname = fresh.nickname || currentUser.nickname;
                // ✅ Same key!
                sessionStorage.setItem('loggedInUser', JSON.stringify(currentUser));
            }
        } catch (e) {
            console.warn('Could not refresh permissions:', e);
        }

        setupUI();
        buildDatabaseCards();
    }

    // ══════════════════════════════════════
    // 🎨 UI SETUP
    // ══════════════════════════════════════
    function setupUI() {
        const badgeColors = {
            'Admin': '#ff4444',
            'Manager': '#2196F3',
            'Cashier': '#4CAF50',
            'Purchasing Officer': '#FF9800',
            'Head Chef': '#9C27B0',
            'Call Operator': '#00BCD4',
            'Waiter': '#607D8B'
        };

        const badge = document.getElementById('userBadge');
        badge.textContent = currentUser.access || 'User';
        badge.style.background = badgeColors[currentUser.access] || '#607D8B';

        // Welcome greeting
        const hour = new Date().getHours();
        let greeting = hour < 12 ? 'Good Morning' : hour < 17 ? 'Good Afternoon' : 'Good Evening';
        document.getElementById('welcomeGreeting').textContent =
            `${greeting}, ${currentUser.name || currentUser.nickname}! 👋`;

        // Stats
        document.getElementById('statUser').textContent = currentUser.name || currentUser.nickname;
        document.getElementById('statAccess').textContent = currentUser.access || 'N/A';

        const now = new Date();
        document.getElementById('statDate').textContent =
            now.toLocaleDateString('en-LK', { year:'numeric', month:'short', day:'numeric' });
    }

    // ══════════════════════════════════════
    // 📂 BUILD DATABASE CARDS
    // ══════════════════════════════════════
    function buildDatabaseCards() {
        const permissions  = currentUser.permissions || {};
        const access       = currentUser.access || '';
        const isAdmin      = access === 'Admin';
        const isAdminOrMgr = ['Admin', 'Manager'].includes(access);
        const grid         = document.getElementById('dbCardsGrid');
        grid.innerHTML     = '';
        let cardCount      = 0;

        // ── 1. EMPLOYEE DATABASE ──
        const empPerm = permissions.employeeDB || {};
        const empAccess = isAdmin || empPerm.add || empPerm.view || empPerm.selfView || empPerm.edit;
        if (empAccess) {
            const permBadges = buildPermBadges(isAdmin ? {add:true,view:true,selfView:true,edit:true,delete:true} : empPerm);
            grid.innerHTML += `
                <a class="db-card" href="index.html">
                    <div class="db-card-header">
                        <div class="db-card-icon">👥</div>
                        <span class="db-card-badge badge-entry">Data Entry</span>
                    </div>
                    <div class="db-card-title">Employee Database</div>
                    <div class="db-card-desc">
                        Employee profiles, permissions සහ access management.
                    </div>
                    <div class="perm-badges">${permBadges}</div>
                    <div class="db-card-arrow">→</div>
                </a>
            `;
            cardCount++;
        }

        // ── 2. DAY END REPORT DATABASE ──
        const dayPerm = permissions.dayEndReportDB || {};
        const dayAccess = isAdmin || dayPerm.add || dayPerm.view || dayPerm.selfView;
        if (dayAccess) {
            const permBadges = buildPermBadges(isAdmin ? {add:true,view:true,selfView:true,edit:true,delete:true} : dayPerm);
            grid.innerHTML += `
                <a class="db-card" href="cashier.html">
                    <div class="db-card-header">
                        <div class="db-card-icon">💰</div>
                        <span class="db-card-badge badge-entry">Data Entry</span>
                    </div>
                    <div class="db-card-title">Day End Report Database</div>
                    <div class="db-card-desc">
                        Daily cashier reports, cash flow සහ bank deposits.
                    </div>
                    <div class="perm-badges">${permBadges}</div>
                    <div class="db-card-arrow">→</div>
                </a>
            `;
            cardCount++;
        }

                // ── 3. INVENTORY DATABASE ──
        const invPerm = permissions.inventoryDB || {};
        const invAccess = isAdmin || invPerm.add || invPerm.view || invPerm.selfView || invPerm.edit;
        if (invAccess) {
            const permBadges = buildPermBadges(isAdmin ? {add:true,view:true,selfView:true,edit:true,delete:true} : invPerm);
            grid.innerHTML += `
                <a class="db-card" href="inventory.html">
                    <div class="db-card-header">
                        <div class="db-card-icon">📦</div>
                        <span class="db-card-badge badge-entry">Data Entry</span>
                    </div>
                    <div class="db-card-title">Inventory Database</div>
                    <div class="db-card-desc">
                        Stock management, items, categories සහ low stock alerts.
                    </div>
                    <div class="perm-badges">${permBadges}</div>
                    <div class="db-card-arrow">→</div>
                </a>
            `;
            cardCount++;
        }
                // ── 4. KITCHEN DATABASE ──
        const kitPerm = permissions.kitchenDB || {};
        const kitAccess = isAdmin || kitPerm.add || kitPerm.view || kitPerm.selfView || kitPerm.edit;
        if (kitAccess) {
            const permBadges = buildPermBadges(isAdmin ? {add:true,view:true,selfView:true,edit:true,delete:true} : kitPerm);
            grid.innerHTML += `
                <a class="db-card" href="kitchen.html">
                    <div class="db-card-header">
                        <div class="db-card-icon">🍳</div>
                        <span class="db-card-badge badge-entry">Kitchen</span>
                    </div>
                    <div class="db-card-title">Kitchen Database</div>
                    <div class="db-card-desc">
                        Recipes, staff meals, wastage tracking සහ stock count.
                    </div>
                    <div class="perm-badges">${permBadges}</div>
                    <div class="db-card-arrow">→</div>
                </a>
            `;
            cardCount++;
        }

        // ── 3. REPORTS DATABASE (Admin/Manager only) ──
        if (isAdminOrMgr) {
            grid.innerHTML += `
                <a class="db-card reports-card" href="reports.html">
                    <div class="db-card-header">
                        <div class="db-card-icon">📊</div>
                        <span class="db-card-badge badge-management">Management</span>
                    </div>
                    <div class="db-card-title">Reports Database</div>
                    <div class="db-card-desc">
                        Business reports, analytics සහ management insights.
                        Day End, Employee, P/L reports සහ තවත් බොහෝ දේ.
                    </div>
                    <div class="perm-badges">
                        <span class="perm-badge perm-reports">📊 View Reports</span>
                        <span class="perm-badge perm-reports">📋 Day End</span>
                        <span class="perm-badge perm-reports">👥 Employees</span>
                    </div>
                    <div class="db-card-arrow">→</div>
                </a>
            `;
            cardCount++;
        }

        // DB Count stat
        document.getElementById('statDBCount').textContent = cardCount;

        // No access message
        if (cardCount === 0) {
            grid.innerHTML = `
                <div class="no-access-msg">
                    <div class="na-icon">🔒</div>
                    <h3>No Database Access</h3>
                    <p>ඔයාට databases access කිරීමට permission නෑ.<br>Admin ට contact කරන්න.</p>
                </div>
            `;
        }
    }

    // ══════════════════════════════════════
    // 🏷️ PERMISSION BADGES
    // ══════════════════════════════════════
    function buildPermBadges(perm) {
        let html = '';
        if (perm.add)      html += `<span class="perm-badge perm-add">➕ Add</span>`;
        if (perm.view)     html += `<span class="perm-badge perm-view">👁️ View All</span>`;
        if (perm.selfView && !perm.view)
                           html += `<span class="perm-badge perm-self">👤 Self View</span>`;
        if (perm.edit)     html += `<span class="perm-badge perm-edit">✏️ Edit</span>`;
        if (perm.delete)   html += `<span class="perm-badge perm-delete">🗑️ Delete</span>`;
        return html;
    }

    // ══════════════════════════════════════
    // 🚪 LOGOUT
    // ══════════════════════════════════════
    function logout() {
        sessionStorage.removeItem('loggedInUser');
        window.location.href = 'login.html';
    }

    // 🚀 START
    init();
</script>
</body>
</html>
