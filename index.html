<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buono - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== TOP NAVIGATION BAR ===== -->
    <div class="topbar">
        <div class="topbar-left">
            <span class="topbar-icon">🍴</span>
            <h2>Buono <span class="topbar-badge admin-badge-top">Admin</span></h2>
        </div>
        <div class="topbar-right">
            <span id="welcomeUser">👋 Welcome</span>
            <button class="btn-logout" onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <!-- ===== MAIN CONTAINER ===== -->
    <div class="dashboard-container">

        <!-- ===== STAT CARDS ===== -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <h3 id="totalEmployees">0</h3>
                    <p>Total Employees</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-info">
                    <h3 id="todayDate">-</h3>
                    <p>Today</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">⏰</div>
                <div class="stat-info">
                    <h3 id="currentTime">-</h3>
                    <p>Current Time</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">🔑</div>
                <div class="stat-info">
                    <h3 id="myAccess">Admin</h3>
                    <p>Access Level</p>
                </div>
            </div>
        </div>

        <!-- ===== ADD EMPLOYEE FORM ===== -->
        <div id="addEmployeeForm">
            <h2>➕ Add New Employee</h2>
            <div class="form-row">
                <input type="text" id="empName" placeholder="Full Name">
                <input type="text" id="empNickname" placeholder="Nickname">
                <input type="text" id="empPassword" placeholder="Password">
                <select id="empAccess">
                    <option value="">-- Access --</option>
                    <option value="Admin">👨‍💼 Admin</option>
                    <option value="Manager">🧑‍💼 Manager</option>
                    <option value="Cashier">💰 Cashier</option>
                    <option value="Purchasing Officer">📦 Purchasing Officer</option>
                    <option value="Head Chef">👨‍🍳 Head Chef</option>
                    <option value="Call Operator">📞 Call Operator</option>
                    <option value="Waiter">🍽️ Waiter</option>
                </select>
                <button onclick="addEmployee()">💾 Add</button>
            </div>
        </div>

        <!-- ===== EMPLOYEE TABLE ===== -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Nickname</th>
                        <th>Access Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeeTableBody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 20px;">
                            ⏳ Loading employees...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ===== FIREBASE SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="app.js"></script>

</body>
</html>
