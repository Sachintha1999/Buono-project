<div class="tab-all-employees">
    
    <!-- 📋 Employees Table -->
    <div class="section-card" 
         style="padding: 0; background: var(--bg-card); border: 1px solid var(--border-light); 
                border-radius: 14px; overflow: hidden;">
        
        <!-- Table Header -->
        <div style="padding: 16px 20px; border-bottom: 1px solid var(--border-light); 
                    display: flex; justify-content: space-between; align-items: center;">
            <h3 id="empListTitle" 
                style="color: var(--gold-primary); font-size: 16px; margin: 0; font-weight: 700;">
                👥 All Employees
            </h3>
            <span id="empCountBadge" 
                  style="background: rgba(212, 175, 55, 0.15); color: var(--gold-primary); 
                         padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 700;">
                0
            </span>
        </div>
        
        <!-- Table -->
        <div class="table-wrap" style="overflow-x: auto;">
            <table class="employee-table data-table mobile-cards" style="width: 100%;">
                <thead>
                    <tr>
                        <th style="padding: 14px 16px; text-align: left; font-size: 12px; 
                                   color: var(--gold-primary); text-transform: uppercase; 
                                   letter-spacing: 0.5px; background: var(--bg-secondary);">#</th>
                        <th style="padding: 14px 16px; text-align: left; font-size: 12px; 
                                   color: var(--gold-primary); text-transform: uppercase; 
                                   letter-spacing: 0.5px; background: var(--bg-secondary);">Name</th>
                        <th style="padding: 14px 16px; text-align: left; font-size: 12px; 
                                   color: var(--gold-primary); text-transform: uppercase; 
                                   letter-spacing: 0.5px; background: var(--bg-secondary);">Nickname</th>
                        <th style="padding: 14px 16px; text-align: left; font-size: 12px; 
                                   color: var(--gold-primary); text-transform: uppercase; 
                                   letter-spacing: 0.5px; background: var(--bg-secondary);">Access</th>
                        <th style="padding: 14px 16px; text-align: left; font-size: 12px; 
                                   color: var(--gold-primary); text-transform: uppercase; 
                                   letter-spacing: 0.5px; background: var(--bg-secondary);">Permissions</th>
                        <th style="padding: 14px 16px; text-align: left; font-size: 12px; 
                                   color: var(--gold-primary); text-transform: uppercase; 
                                   letter-spacing: 0.5px; background: var(--bg-secondary);">Actions</th>
                    </tr>
                </thead>
                <tbody id="employeeTableBody">
                    <!-- Loading skeleton -->
                    <tr>
                        <td colspan="6" style="padding: 40px; text-align: center;">
                            <div class="loader-ring" style="margin: 0 auto;"></div>
                            <div style="margin-top: 12px; color: var(--text-muted); font-size: 13px;">
                                Loading employees...
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- Pagination -->
        <div id="empPaginationWrap" 
             style="display: none; padding: 16px 20px; border-top: 1px solid var(--border-light); 
                    text-align: center;">
            <span id="empCounter" 
                  style="color: var(--text-muted); font-size: 13px; margin-right: 16px;">
                Showing 0 of 0
            </span>
            <button id="btnLoadMoreEmp" 
                    class="toolbar-btn toolbar-btn-secondary"
                    onclick="loadMoreEmployees()"
                    style="display: none;">
                ⬇️ Load More
            </button>
        </div>
        
    </div>
    
</div>
