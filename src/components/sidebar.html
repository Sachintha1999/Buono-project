<!-- ═══════════════════════════════════════════════════════════
     INIT SCRIPT - Path fixing ONLY (no event bindings!)
     All events handled by: buono-page-builder.js
     ═══════════════════════════════════════════════════════════ -->
<script>
(function() {
    'use strict';
    
    // Auto-detect base path depth
    var depth = window.location.pathname.split('/').filter(function(p) { 
        return p && p.indexOf('.') === -1; 
    }).length;
    var prefix = '';
    for (var i = 0; i < depth; i++) prefix += '../';
    
    // Fix all sidebar links with correct paths
    var links = document.querySelectorAll('#appSidebar .sidebar-item[data-page], #topbarBrand[data-page]');
    links.forEach(function(link) {
        var page = link.getAttribute('data-page');
        if (page) {
            link.href = prefix + page;
        }
    });
    
    // Mark active page
    var currentFile = window.location.pathname.split('/').pop() || 'index.html';
    
    document.querySelectorAll('#appSidebar .sidebar-item[data-page]').forEach(function(link) {
        var page = link.getAttribute('data-page') || '';
        var linkFile = page.split('/').pop();
        if (linkFile === currentFile) {
            link.classList.add('active');
        }
    });
    
    // Mobile: close sidebar on link click (only thing we bind here)
    document.querySelectorAll('#appSidebar .sidebar-item').forEach(function(link) {
        link.addEventListener('click', function() {
            if (window.innerWidth <= 768 && typeof window.closeSidebar === 'function') {
                window.closeSidebar();
            }
        });
    });
    
    console.log('[Sidebar Component] ✓ Paths fixed (' + links.length + ' links)');
})();
</script>
