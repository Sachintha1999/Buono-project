<!-- ═══════════════════════════════════════════════════
     📜 LAYOUT TYPE 3: SCROLLING SECTIONS (payment.html style)
     ═══════════════════════════════════════════════════ 
     
     Use this for: Single-page forms, dashboards
     Examples: Payment, Access, Profile
     
     ⭐ DEFAULT - This layout is ACTIVE
     Delete this section if using Layout 1 or 2
     ═══════════════════════════════════════════════════ -->

<div class="dashboard-container">

    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title">📄 PAGE_TITLE</h1>
        <p class="page-subtitle">PAGE_SUBTITLE</p>
    </div>

    <!-- Stats Row (Optional) -->
    <div class="stats-row" id="statsRow">
        <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-info">
                <div class="stat-number" id="stat1">0</div>
                <div class="stat-label">Stat 1</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📈</div>
            <div class="stat-info">
                <div class="stat-number" id="stat2">0</div>
                <div class="stat-label">Stat 2</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div class="stat-info">
                <div class="stat-number" id="stat3">Rs. 0</div>
                <div class="stat-label">Stat 3</div>
            </div>
        </div>
    </div>

    <!-- Section 1: Example -->
    <div class="section-card">
        <h2 class="section-title">📋 Section Title</h2>
        <p class="section-desc">Section description here</p>
        
        <!-- Your form/content here -->
        <div class="form-group">
            <label>Field Label</label>
            <input type="text" class="form-input" placeholder="Enter value">
        </div>
    </div>

    <!-- Section 2: Example with Table -->
    <div class="section-card">
        <div class="section-header-row">
            <h2 class="section-title">📊 Data Table</h2>
            <div class="header-actions">
                <input type="text" placeholder="🔍 Search..." class="search-input">
                <button class="btn-primary">➕ Add New</button>
            </div>
        </div>

        <div class="table-wrap">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <tr>
                        <td colspan="4" class="table-loading">
                            <div class="loading-spinner"></div>
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
